<!DOCTYPE html>
<html>
<head>
  <base href="/ho-tro-tim-tai-lieu/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Ứng dụng hỗ trợ kỹ thuật chạy dạng PWA, có thể thêm ra màn hình chính trên iPhone.">
  <meta name="theme-color" content="#1565c0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ATM Support">
  <meta name="format-detection" content="telephone=no">

  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="manifest" href="manifest.json">

  <title>Hỗ trợ kỹ thuật ATM</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      height: 100%;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
    }

    #boot-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      color: #1f2937;
      text-align: center;
      padding: 24px;
    }

    #boot-card {
      max-width: 360px;
    }

    .spinner {
      width: 42px;
      height: 42px;
      margin: 0 auto 16px;
      border-radius: 50%;
      border: 4px solid #dbeafe;
      border-top-color: #1565c0;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="boot-screen">
    <div id="boot-card">
      <div class="spinner"></div>
      <h2>Hỗ trợ kỹ thuật ATM</h2>
      <p>Đang mở ứng dụng PWA...</p>
    </div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var boot = document.getElementById('boot-screen');
      if (boot) boot.remove();
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
